# ===================================================
# Nginx 反向代理配置
# 支持多域名同时访问：
#   - https://leezcarco.v.qxhua21.cn
#   - 可扩展更多域名（见 server_name）
#
# 功能：
#   - HTTP → HTTPS 自动跳转
#   - WebSocket 代理（SocketIO 实时通信）
#   - SSL/TLS 终止
#   - Gzip 压缩
# ===================================================

# ==================== HTTP → HTTPS 跳转 ====================
server {
    listen 80;
    # 支持多个域名，空格分隔即可扩展
    server_name leezcarco.v.qxhua21.cn
                www.leezcarco.v.qxhua21.cn;
                # 如需添加更多域名，在此继续添加

    # Let's Encrypt 证书验证（ACME challenge）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余所有请求跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS 主配置 ====================
server {
    listen 443 ssl http2;
    server_name leezcarco.v.qxhua21.cn
                www.leezcarco.v.qxhua21.cn;
                # 如需添加更多域名，在此继续添加

    # ---- SSL 证书（Let's Encrypt 或自签名） ----
    # 使用 Let's Encrypt：证书路径按实际替换
    ssl_certificate     /etc/nginx/ssl/leezcarco.v.qxhua21.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/leezcarco.v.qxhua21.cn/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS（可选，强制 HTTPS）
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ---- 基础配置 ----
    client_max_body_size 50M;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ---- 访问日志 ----
    access_log /var/log/nginx/leezcarco_access.log;
    error_log  /var/log/nginx/leezcarco_error.log;

    # ---- 静态文件直接由 Nginx 服务（可选优化） ----
    # location /static/ {
    #     alias /app/static/;
    #     expires 7d;
    # }

    # ---- WebSocket 代理（Flask-SocketIO 必须） ----
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # WebSocket 长连接，不要超时
        proxy_send_timeout 86400s;
    }

    # ---- 普通 HTTP 请求反向代理 ----
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;

        # 防止缓冲导致 SSE/流式响应延迟
        proxy_buffering off;
    }
}

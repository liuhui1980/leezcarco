<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自动监控列表 — TikTok 直播监测</title>
<style>
  :root {
    --primary:#fe2c55; --primary-bg:#fff0f3;
    --bg:#f5f6fa; --surface:#ffffff;
    --border:#e8eaef; --border2:#f0f1f5;
    --text:#1a1d2e; --text2:#6b7280; --text3:#9ca3af;
    --success:#10b981; --danger:#ef4444; --warning:#f59e0b;
    --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
    --radius:12px; --font:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); }
  .navbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .navbar-brand { text-decoration:none; display:flex; align-items:center; gap:10px; }
  .navbar-logo { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#fe2c55 0%,#25f4ee 100%); display:flex; align-items:center; justify-content:center; }
  .navbar-logo svg { width:18px; height:18px; }
  .navbar-name { font-size:15px; font-weight:800; color:var(--text); }
  .navbar-name span { color:var(--primary); }
  .nav-link { color:var(--text2); text-decoration:none; font-size:14px; padding:6px 12px; border-radius:6px; }
  .nav-link:hover { background:var(--bg); }
  .main { max-width:1000px; margin:0 auto; padding:24px; }
  .page-title { font-size:20px; font-weight:700; margin-bottom:6px; }
  .page-sub { font-size:13px; color:var(--text2); margin-bottom:24px; }

  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:20px; box-shadow:var(--shadow); }
  .panel-title { font-size:15px; font-weight:700; margin-bottom:16px; }

  /* 导入区 */
  .import-area { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:flex-start; }
  textarea.import-input {
    width:100%; min-height:120px; padding:10px 12px;
    border:1.5px solid var(--border); border-radius:8px; font-size:13px;
    font-family:var(--font); resize:vertical; outline:none;
    color:var(--text); background:var(--bg);
  }
  textarea.import-input:focus { border-color:var(--primary); background:#fff; }
  .import-hint { font-size:12px; color:var(--text3); margin-top:6px; line-height:1.6; }
  .import-actions { display:flex; flex-direction:column; gap:8px; min-width:120px; }

  /* 按钮 */
  .btn { padding:9px 16px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; transition:opacity .15s; }
  .btn:hover { opacity:.85; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-success { background:var(--success); color:#fff; }
  .btn-danger { background:var(--danger); color:#fff; font-size:12px; padding:5px 10px; }
  .btn-sm { font-size:12px; padding:5px 12px; border-radius:6px; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text2); }
  .btn-outline:hover { background:var(--bg); }

  /* 账号列表 */
  .account-list { display:flex; flex-direction:column; gap:8px; }
  .account-row {
    display:grid; grid-template-columns:auto 1fr auto auto auto auto;
    align-items:center; gap:12px;
    padding:10px 14px; background:var(--bg); border-radius:8px;
    border:1px solid var(--border2);
  }
  .account-row.live { border-color:var(--primary); background:var(--primary-bg); }
  .account-row.disabled { opacity:.5; }
  .ac-status { width:8px; height:8px; border-radius:50%; background:var(--text3); flex-shrink:0; }
  .ac-status.live { background:var(--primary); animation:pulse 1.5s infinite; }
  .ac-name { font-size:14px; font-weight:600; color:var(--text); }
  .ac-note { font-size:12px; color:var(--text3); }
  .ac-group { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; flex-shrink:0; }
  .tag-own { background:#d1fae5; color:#065f46; }
  .tag-rival { background:#fee2e2; color:#991b1b; }
  .tag-watch { background:#dbeafe; color:#1e40af; }

  .toggle-switch { position:relative; width:40px; height:22px; flex-shrink:0; }
  .toggle-switch input { opacity:0; width:0; height:0; }
  .toggle-slider {
    position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
    background:#ccc; border-radius:22px; transition:.3s;
  }
  .toggle-slider:before {
    position:absolute; content:""; width:16px; height:16px;
    left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s;
  }
  input:checked + .toggle-slider { background:var(--success); }
  input:checked + .toggle-slider:before { transform:translateX(18px); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* 统计栏 */
  .stats-bar { display:flex; gap:20px; padding:12px 16px; background:var(--bg); border-radius:8px; margin-bottom:16px; }
  .stat-item { text-align:center; }
  .stat-val { font-size:20px; font-weight:700; color:var(--text); }
  .stat-label { font-size:11px; color:var(--text3); margin-top:2px; }

  /* toast */
  #toast { position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:10px; font-size:14px; font-weight:600; color:#fff; background:#333; transform:translateY(80px); opacity:0; transition:all .3s; z-index:9999; pointer-events:none; }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast.success { background:var(--success); }
  #toast.error { background:var(--danger); }

  /* ── 响应式 ── */
  @media(max-width:768px) {
    .main { padding:16px; max-width:100%; }
    .import-area { grid-template-columns:1fr; }
    .import-actions { flex-direction:row; flex-wrap:wrap; min-width:unset; }
  }
  @media(max-width:640px) {
    .navbar { padding:0 12px; height:auto; min-height:56px; flex-wrap:wrap; padding-top:8px; padding-bottom:8px; }
    .nav-link { font-size:12px; padding:4px 8px; }
    .main { padding:10px; }
    .panel { padding:14px; }
    .am-header { flex-wrap:wrap; gap:6px; }
  }
  @media(max-width:480px) {
    .navbar-sub, .version-badge { display:none; }
    .page-title { font-size:17px; }
  }

  /* ── 版本徽章 ── */
  .version-badge { font-size:10px;font-weight:700;color:#6b7280;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:10px;padding:2px 7px;cursor:pointer;transition:all .15s;user-select:none;letter-spacing:.3px;white-space:nowrap; }
  .version-badge:hover { background:#e5e7eb;color:#374151; }
  .changelog-modal { display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.4);align-items:center;justify-content:center; }
  .changelog-modal.open { display:flex; }
  .changelog-box { background:#fff;border-radius:16px;width:560px;max-width:92vw;max-height:75vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .changelog-header { padding:18px 22px 14px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center; }
  .changelog-header h3 { font-size:15px;font-weight:700;color:#1a1d2e; }
  .changelog-header button { background:none;border:none;cursor:pointer;font-size:18px;color:#9ca3af;line-height:1; }
  .changelog-content { padding:16px 22px;overflow-y:auto;flex:1;font-size:13px;line-height:1.7;color:#374151; }
  .changelog-content h2 { font-size:14px;font-weight:700;color:#fe2c55;margin:12px 0 4px; }
  .changelog-content h3 { font-size:13px;font-weight:600;color:#1a1d2e;margin:8px 0 4px; }
  .changelog-content li { margin-left:16px; }
</style>
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="/">
    <div class="navbar-logo">
      <svg viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V9.51a8.16 8.16 0 004.77 1.52V7.58a4.85 4.85 0 01-1-.89z"/></svg>
    </div>
    <div class="navbar-wordmark">
      <div class="navbar-name">Tuke<span>carco</span></div>
      <div class="navbar-sub">TikTok 直播监测系统</div>
    </div>
    <span class="version-badge" onclick="openChangelog(event)" title="点击查看版本日志">v{{ app_version }}</span>
  </a>
  <nav class="navbar-nav">
    <a href="/" class="nav-link">实时看板</a>
    <a href="/history" class="nav-link">历史记录</a>
    <a href="/automonitor" class="nav-link active">📋 自动监控</a>
    <a href="/rivals" class="nav-link">⚔️ 竞品分析</a>
    <a href="/compare" class="nav-link">📊 自营对比</a>
    <a href="/admin" class="nav-link" id="adminNavLink" style="display:none">👑 用户管理</a>
    <span id="navUserBadge" style="font-size:12px;background:#fff0f3;color:#fe2c55;border-radius:20px;padding:3px 10px;font-weight:600;margin-left:4px"></span>
    <button class="nav-btn" onclick="authLogout()" style="margin-left:2px">退出</button>
  </nav>
</nav>

<div class="main">
  <div class="page-title">📋 自动监控列表</div>
  <div class="page-sub">添加你的自营账号，系统会在启动后自动开始监控。只要账号开播，立即开始采集数据。</div>

  <!-- 批量导入 -->
  <div class="panel">
    <div class="panel-title">📥 批量导入账号</div>
    <div class="import-area">
      <div>
        <textarea class="import-input" id="importText" placeholder="每行一个账号，支持以下格式：
username
@username
username,备注名
username,备注名,own
username,备注名,rival

分组选项：own（自营）/ rival（竞品）/ watch（关注）
默认分组：own（自营）"></textarea>
        <div class="import-hint">
          💡 提示：粘贴账号列表后点击「解析导入」，系统会自动去重并添加到监控列表。<br>
          添加后如需立即开始监控，点击右侧「一键启动全部」按钮。
        </div>
      </div>
      <div class="import-actions">
        <button class="btn btn-primary" onclick="parseAndImport()">✅ 解析导入</button>
        <button class="btn btn-success" onclick="startAll()">▶ 一键启动全部</button>
        <button class="btn btn-outline" onclick="loadList()">🔄 刷新列表</button>
      </div>
    </div>
  </div>

  <!-- 当前列表 -->
  <div class="panel">
    <div class="panel-title">📊 监控列表 <span style="font-size:12px;color:var(--text3);font-weight:400;" id="listSummary"></span></div>
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat-item"><div class="stat-val" id="statTotal">0</div><div class="stat-label">总账号数</div></div>
      <div class="stat-item"><div class="stat-val" id="statEnabled">0</div><div class="stat-label">已启用</div></div>
      <div class="stat-item"><div class="stat-val" id="statLive" style="color:var(--primary);">0</div><div class="stat-label">直播中</div></div>
      <div class="stat-item"><div class="stat-val" id="statOwn">0</div><div class="stat-label">自营账号</div></div>
      <div class="stat-item"><div class="stat-val" id="statRival">0</div><div class="stat-label">竞品账号</div></div>
    </div>
    <div class="account-list" id="accountList">
      <div style="text-align:center;padding:40px;color:var(--text3);font-size:13px;">加载中...</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── 用户信息 ──
(async () => {
  try {
    const res = await fetch('/api/auth/me');
    if (res.status === 401) { location.href = '/login'; return; }
    const me = await res.json();
    if (me.logged_in) document.getElementById('navUserBadge').textContent = me.username;
  } catch(e) {}
})();
async function authLogout() {
  await fetch('/api/auth/logout', {method:'POST'});
  location.href = '/login';
}

function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ''; }, 2800);
}

// ── 加载列表 ──
async function loadList() {
  const res = await fetch('/api/automonitor/list');
  const data = await res.json();
  const list = data.list || [];
  renderList(list);
}

function renderList(list) {
  const el = document.getElementById('accountList');
  const statsBar = document.getElementById('statsBar');

  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px;">暂无账号，请在上方导入</div>';
    statsBar.style.display = 'none';
    return;
  }

  statsBar.style.display = 'flex';
  document.getElementById('statTotal').textContent = list.length;
  document.getElementById('statEnabled').textContent = list.filter(r=>r.enabled).length;
  document.getElementById('statLive').textContent = list.filter(r=>r.is_live).length;
  document.getElementById('statOwn').textContent = list.filter(r=>r.group_name==='own').length;
  document.getElementById('statRival').textContent = list.filter(r=>r.group_name==='rival').length;

  const groupMap = { own:'自营', rival:'竞品', watch:'关注' };
  el.innerHTML = list.map(r => {
    const grpCls = `tag-${r.group_name||'own'}`;
    const grpLabel = groupMap[r.group_name] || r.group_name;
    return `<div class="account-row${r.is_live?' live':''}${!r.enabled?' disabled':''}" id="row-${r.username}">
      <span class="ac-status${r.is_live?' live':''}"></span>
      <div>
        <div class="ac-name">@${r.username}${r.display_name && r.display_name!==r.username ? ` <span style="font-size:12px;color:var(--text3);">(${r.display_name})</span>` : ''}</div>
        ${r.note ? `<div class="ac-note">${r.note}</div>` : ''}
      </div>
      <span class="ac-group ${grpCls}">${grpLabel}</span>
      ${r.is_live ? '<span style="font-size:11px;background:#fff0f3;color:#fe2c55;border-radius:10px;padding:2px 8px;font-weight:600;">直播中</span>' : '<span style="font-size:11px;color:var(--text3);">未开播</span>'}
      <label class="toggle-switch" title="${r.enabled?'点击禁用':'点击启用'}">
        <input type="checkbox" ${r.enabled?'checked':''} onchange="toggleAccount('${r.username}', this.checked)">
        <span class="toggle-slider"></span>
      </label>
      <button class="btn btn-danger btn-sm" onclick="deleteAccount('${r.username}')">移除</button>
    </div>`;
  }).join('');
}

// ── 解析并导入 ──
async function parseAndImport() {
  const raw = document.getElementById('importText').value.trim();
  if (!raw) { showToast('请输入账号列表', 'error'); return; }
  const lines = raw.split('\n').filter(l => l.trim());
  const accounts = [];
  for (const line of lines) {
    const parts = line.trim().split(',').map(s => s.trim());
    let username = (parts[0] || '').replace(/^@/, '');
    if (!username) continue;
    const display_name = parts[1] || '';
    const group_name = ['own','rival','watch'].includes(parts[2]) ? parts[2] : 'own';
    accounts.push({ username, display_name, group_name });
  }
  if (!accounts.length) { showToast('未解析到有效账号', 'error'); return; }
  const res = await fetch('/api/automonitor/import', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ accounts })
  });
  const data = await res.json();
  if (data.success) {
    showToast(`✅ 成功导入 ${data.count} 个账号`, 'success');
    document.getElementById('importText').value = '';
    loadList();
  } else {
    showToast('导入失败', 'error');
  }
}

// ── 一键启动全部 ──
async function startAll() {
  const res = await fetch('/api/automonitor/start_all', {method:'POST'});
  const data = await res.json();
  const started = (data.results||[]).filter(r=>r.started).length;
  showToast(`▶ 已启动 ${started} 个监控任务`, 'success');
  setTimeout(loadList, 1500);
}

// ── 切换启用/禁用 ──
async function toggleAccount(username, enabled) {
  await fetch('/api/automonitor/toggle', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username, enabled})
  });
  showToast(enabled ? `已启用 @${username}` : `已禁用 @${username}`, 'success');
}

// ── 移除 ──
async function deleteAccount(username) {
  if (!confirm(`确定从监控列表移除 @${username}？（不会删除历史数据）`)) return;
  await fetch('/api/automonitor/delete', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username})
  });
  showToast(`已移除 @${username}`, 'success');
  loadList();
}

// 初始加载
loadList();
// 每30秒刷新直播状态
setInterval(loadList, 30000);
</script>

<!-- ── 版本日志弹窗 ── -->
<div class="changelog-modal" id="changelogModal" onclick="if(event.target===this)closeChangelog()">
  <div class="changelog-box">
    <div class="changelog-header">
      <h3>📋 版本日志</h3>
      <button onclick="closeChangelog()">✕</button>
    </div>
    <div class="changelog-content" id="changelogContent">加载中...</div>
  </div>
</div>
<script>
function openChangelog(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  document.getElementById('changelogModal').classList.add('open');
  fetch('/api/version').then(r=>r.json()).then(d=>{
    let html = (d.changelog||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html = html.replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^- (.+)$/gm,'<li>$1</li>');
    document.getElementById('changelogContent').innerHTML = html;
  }).catch(()=>{ document.getElementById('changelogContent').textContent='加载失败'; });
}
function closeChangelog() { document.getElementById('changelogModal').classList.remove('open'); }
</script>
</body>
</html>

version: '3.8'

services:
  # ===================================================
  # 主应用：TikTok 直播监控系统
  # ===================================================
  tiktok-monitor:
    build: .
    container_name: tiktok-monitor
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # 数据库持久化
      - ./data:/app/data
      # Excel 报告持久化
      - ./reports:/app/reports
      # 配置文件（需要在宿主机手动创建 config.py）
      - ./config.py:/app/config.py:ro
      # Whisper 模型缓存（避免每次重启重新下载 ~3GB）
      - whisper-cache:/root/.cache/whisper
    environment:
      - PYTHONUNBUFFERED=1
    # ===================================================
    # GPU 支持（NVIDIA 4070Ti + WSL2）
    # 需要安装 NVIDIA Container Toolkit
    # ===================================================
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # 依赖代理服务（如果使用 Clash 容器）
    # depends_on:
    #   - clash-proxy
    networks:
      - monitor-net

  # ===================================================
  # 可选：Clash 代理容器（访问 TikTok 用）
  # 如果宿主机已有代理，注释掉这个 service
  # ===================================================
  # clash-proxy:
  #   image: dreamacro/clash:latest
  #   container_name: clash-proxy
  #   volumes:
  #     - ./clash-config:/root/.config/clash
  #   ports:
  #     - "7897:7897"
  #   networks:
  #     - monitor-net

volumes:
  whisper-cache:
    driver: local

networks:
  monitor-net:
    driver: bridge

version: '3.8'

services:
  # ===================================================
  # 主应用：TikTok 直播监控系统
  # ===================================================
  tiktok-monitor:
    image: 192.168.2.111:80/car/leezcarco:latest   # 从私有仓库拉取
    # build: .                                       # 本地构建时取消注释
    container_name: tiktok-monitor
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      # 数据库持久化
      - ./data:/app/data
      # Excel 报告持久化
      - ./reports:/app/reports
      # 配置文件挂载
      # ⚠️ 重要：config.py 必须提前在宿主机创建好（文件，不是目录）
      # Windows 用户：在 D:\docker\leezcarco\ 下创建 config.py 文件
      - ./config.py:/app/config.py:ro
      # Whisper 模型缓存（避免每次重启重新下载 ~3GB）
      - whisper-cache:/root/.cache/whisper
    environment:
      - PYTHONUNBUFFERED=1
    # ===================================================
    # GPU 支持（NVIDIA 4070Ti + WSL2）
    # 需要安装 NVIDIA Container Toolkit
    # Windows WSL2 用户：确保已安装 NVIDIA 驱动 >=525
    # ===================================================
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - monitor-net

volumes:
  whisper-cache:
    driver: local

networks:
  monitor-net:
    driver: bridge
